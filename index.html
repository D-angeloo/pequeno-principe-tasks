<!DOCTYPE html>
<html lang="pt-br"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afazeres do Pequeno Príncipe</title>
    <link rel="stylesheet" href="./dist/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/webp" href="./assets/stm.webp">
</head>
<body class="relative bg-slate-950 text-white min-h-screen transition-all duration-1000 overflow-x-hidden">
  
  <div id="tsparticles" class="absolute inset-0 -z-10 pointer-events-none"></div>

  <main class="min-h-screen flex items-center justify-center p-4">

    <section id="app" 
      class="relative flex flex-col gap-6 bg-white/10 backdrop-blur-2xl border border-white/10 p-5 md:p-8 pt-16 md:pt-20 rounded-2xl w-full max-w-2xl shadow-2xl text-white">

      <div class="absolute -top-10 md:-top-14 left-1/2 -translate-x-1/2
            w-20 h-20 md:w-28 md:h-28
            rounded-full border border-white/30 shadow-lg ring-4 ring-white/5 overflow-hidden">
          <img src="./assets/moonP.jpg" alt="Pequeno Príncipe" class="w-full h-full object-cover">
      </div>

      <header class="text-center space-y-1">
        <h1 id="app-title" class="text-3xl font-light tracking-wide">Minhas Tarefas</h1>
        <p id="app-subtitle" class="text-sm text-white/70 italic transition-all duration-500">Organize seu planeta</p>
      </header>

      <form id="task-form" class="flex gap-2" onsubmit="event.preventDefault();"> <input 
            id="task-input"
            type="text"
            placeholder="Adicionar nova tarefa..."
            class="flex-1 bg-white/5 border border-white/10 rounded-lg px-4 py-2 placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-indigo-400/40 transition"
        />
        <button id="add-task-btn"
            type="submit"
            class="px-6 py-2 rounded-lg bg-indigo-500/80 hover:bg-indigo-400 text-white font-light tracking-wide transition-all duration-300 shadow-md active:scale-95">
            Adicionar
        </button>
      </form>

      <nav id="filters" class="flex flex-wrap gap-2 justify-center">
        <button data-filter="all" class="px-3 py-1 border border-indigo-400 bg-indigo-500/20 rounded-full text-xs shadow-sm transition">Todas</button>
        <button data-filter="important" class="px-3 py-1 border border-white/20 rounded-full hover:bg-white/10 transition text-xs text-white/70">Importante 🌹</button>
        <button data-filter="personal" class="px-3 py-1 border border-white/20 rounded-full hover:bg-white/10 transition text-xs text-white/70">Pessoal 🦊</button>
        <button data-filter="completed" class="px-3 py-1 border border-white/20 rounded-full hover:bg-white/10 transition text-xs text-white/70">Concluídas</button>
      </nav>

      <ul id="task-list" class="flex flex-col gap-2 min-h-25 max-h-25 overflow-y-auto pr-2 custom-scrollbar">
        </ul>

      <footer id="progress" class="text-xs text-white/50 text-center border-t border-white/5 pt-4">
        <span id="progress-text">0 de 0 tarefas cativadas</span>
      </footer>

    </section>
  </main>

 <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
   <script type="module" src="./src/js/main.js"></script>
</body>
</html>
